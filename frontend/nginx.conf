server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # All /api/* requests are forwarded to the backend container.
    # The Angular build uses apiUrl: '/api', so no hostname is baked into the JS.
    location /api/ {
        proxy_pass         http://backend:5111/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Angular SPA routing ───────────────────────────────────────────────────
    # Unknown paths are served as index.html so the Angular router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Response compression ──────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
